<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Car Showroom</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; pointer-events: none;
        }

        .btn {
            pointer-events: auto;
            padding: 15px 40px; margin: 10px;
            background: transparent; border: 2px solid #00d2ff;
            color: #00d2ff; cursor: pointer; font-size: 1.2rem;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn:hover { background: #00d2ff; color: #000; box-shadow: 0 0 20px #00d2ff; }
        #hidden-ui { display: none; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div class="ui-layer" id="main-menu">
        <h1>CAR SHOWROOM</h1>
        <button class="btn" onclick="startGame()">Play</button>
        <button class="btn">Sign In</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // Particle background
        const particles = new THREE.Points(
            new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(3000), 3)),
            new THREE.PointsMaterial({ size: 0.02, color: 0x444444 })
        );
        scene.add(particles);

        // Car Group
        const cars = new THREE.Group();
        scene.add(cars);

        // Simple Geometric Car Factory
        function createCar(color, x) {
            const car = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 2), new THREE.MeshPhongMaterial({ color }));
            const roof = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.3, 1), new THREE.MeshPhongMaterial({ color: 0x333333 }));
            roof.position.y = 0.35;
            car.add(body, roof);
            car.position.x = x;
            return car;
        }

        cars.add(createCar(0xff0000, -2.5));
        cars.add(createCar(0x00ff00, 0));
        cars.add(createCar(0x0000ff, 2.5));
        cars.visible = false; // Hidden initially

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light, new THREE.AmbientLight(0x404040));

        camera.position.z = 5;

        function startGame() {
            document.getElementById('main-menu').style.display = 'none';
            cars.visible = true;
        }

        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) * 0.002;
            mouseY = (e.clientY - window.innerHeight / 2) * 0.002;
        });

        function animate() {
            requestAnimationFrame(animate);
            // Reactive rotation
            cars.rotation.y += (mouseX - cars.rotation.y) * 0.05;
            cars.rotation.x += (mouseY - cars.rotation.x) * 0.05;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
